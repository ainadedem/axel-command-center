name: Reusable SSR Deploy

on:
  workflow_call:
    inputs:
      branch:
        required: true
        type: string
      app_path:
        required: true
        type: string
      public_url:
        required: false
        type: string
        default: ""
      environment_name:
        required: false
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Node SSR bundle
        run: NITRO_PRESET=node_server npm run build

      - name: Prepare release archive
        run: |
          mkdir -p .release/scripts
          cp ecosystem.config.cjs .release/ecosystem.config.cjs
          cp scripts/health-check-services.sh .release/scripts/health-check-services.sh
          cp scripts/restart-ssr.sh .release/scripts/restart-ssr.sh
          cp package.json .release/package.json
          tar -czf axel-command-center-release.tar.gz \
            .output \
            .release

      - name: Upload release archive to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: axel-command-center-release.tar.gz
          target: /tmp

      - name: Activate release on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          command_timeout: 20m
          script: |
            set -e
            cd "${{ inputs.app_path }}"
            tar -xzf /tmp/axel-command-center-release.tar.gz -C "${{ inputs.app_path }}"
            rsync -a .release/ ./
            rm -rf .release
            rm -f /tmp/axel-command-center-release.tar.gz
            mkdir -p logs scripts
            chmod +x ./scripts/health-check-services.sh ./scripts/restart-ssr.sh
            PM2_RUN_AS="${{ secrets.VPS_USERNAME }}" ./scripts/restart-ssr.sh
            PUBLIC_BASE_URL="${{ inputs.public_url }}" ./scripts/health-check-services.sh
            sudo nginx -t
            sudo systemctl reload nginx
